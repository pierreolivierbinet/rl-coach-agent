version: '3.8'

services:
  db:
    image: postgres:16
    container_name: rl_coach_db
    environment:
      POSTGRES_DB: rl_coach_db
      POSTGRES_USER: coach_admin
      POSTGRES_PASSWORD: development_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
